# ============================================================================
# tmux Configuration - Emacs-Friendly Settings
# ============================================================================
# This configuration uses Ctrl+^ (C-^) as the prefix instead of the default
# Ctrl+b, which conflicts with emacs backward-char command.
#
# Quick Reference:
#   Prefix: Ctrl+^ (press Ctrl and ^ together)
#   New window: Prefix + c
#   Split horizontal: Prefix + |
#   Split vertical: Prefix + -
#   Switch panes: Prefix + arrow keys
#   Detach: Prefix + d
#   List sessions: tmux ls
#   Attach: tmux attach -t <session-name>
# ============================================================================

# ----------------------------------------------------------------------------
# Prefix Key Configuration
# ----------------------------------------------------------------------------
# Unbind the default prefix (Ctrl+b) which conflicts with emacs
unbind C-b

# Set prefix to Ctrl+^ (emacs-friendly, doesn't conflict with common commands)
set-option -g prefix C-^

# Allow sending Ctrl+^ to applications by pressing it twice
bind C-^ send-prefix

# ----------------------------------------------------------------------------
# General Settings
# ----------------------------------------------------------------------------
# Enable mouse support (scroll, select panes, resize panes)
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable 256 color support
set -g default-terminal "screen-256color"

# Reduce escape time (improves vim/emacs responsiveness)
set -sg escape-time 10

# Increase repeat time for repeatable commands
set -g repeat-time 600

# Enable focus events (useful for vim/emacs)
set -g focus-events on

# ----------------------------------------------------------------------------
# Window and Pane Management
# ----------------------------------------------------------------------------
# More intuitive pane splitting commands
# Horizontal split: Prefix + | (vertical line)
bind | split-window -h -c "#{pane_current_path}"

# Vertical split: Prefix + - (horizontal line)
bind - split-window -v -c "#{pane_current_path}"

# Unbind default split keys
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation with arrow keys (with prefix)
bind Up select-pane -U
bind Down select-pane -D
bind Left select-pane -L
bind Right select-pane -R

# Pane resizing with Prefix + Shift + arrow keys
bind -r S-Up resize-pane -U 5
bind -r S-Down resize-pane -D 5
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5

# ----------------------------------------------------------------------------
# Status Bar Configuration
# ----------------------------------------------------------------------------
# Enable status bar
set -g status on

# Update status bar every 5 seconds
set -g status-interval 5

# Status bar positioning
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour234,fg=colour137

# Left status: session name
set -g status-left '#[fg=colour233,bg=colour245,bold] #S #[default] '
set -g status-left-length 20

# Right status: date and time
set -g status-right '#[fg=colour233,bg=colour241,bold] %Y-%m-%d #[fg=colour233,bg=colour245,bold] %H:%M '
set -g status-right-length 50

# Window status format
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# ----------------------------------------------------------------------------
# Copy Mode (Emacs-style by default)
# ----------------------------------------------------------------------------
# tmux uses emacs-style keybindings by default in copy mode
# If you prefer vi-style, uncomment the following line:
# setw -g mode-keys vi

# Make copy mode more accessible
bind Escape copy-mode

# ----------------------------------------------------------------------------
# Miscellaneous Keybindings
# ----------------------------------------------------------------------------
# Reload configuration file
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"

# Clear screen and scrollback buffer
bind C-l send-keys C-l \; clear-history

# Toggle synchronize-panes (send commands to all panes)
bind S set-window-option synchronize-panes\; display "synchronize-panes: #{?pane_synchronized,ON,OFF}"

# ----------------------------------------------------------------------------
# Extension Ideas (uncomment to enable)
# ----------------------------------------------------------------------------

# # Auto-rename windows based on current program
# setw -g automatic-rename on
# set -g set-titles on

# # Enable activity alerts
# setw -g monitor-activity on
# set -g visual-activity off

# # Aggressive resize (useful for multi-user sessions)
# setw -g aggressive-resize on

